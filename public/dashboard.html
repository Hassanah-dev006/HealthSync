<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08393e" />
  <title>Health Dashboard · Malaria Surveillance</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="topbar">
    <div class="logo-dot">＋</div>
    <div class="brand">Health Dashboard<small>District surveillance · Live view</small></div>
    <div class="spacer"></div>
    <a class="navlink" href="/report.html">Report</a>
    <a class="navlink" href="/">Home</a>
  </div>

  <div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <span class="eyebrow">Gasabo District · Kigali</span>
        <h1 class="title" style="margin-top:2px">Malaria surveillance overview</h1>
      </div>
      <div class="subtle"><span class="pulse"></span><span id="liveLabel">Live — updates every 5s</span></div>
    </div>

     <div class="dash-grid" style="margin-top:16px">
      <!-- Map -->
      <div>
        <div id="map"></div>
        <div class="legend">
          <span><span class="dot high"></span> High risk</span>
          <span><span class="dot medium"></span> Medium risk</span>
          <span><span class="dot low"></span> Low risk</span>
          <span>⬤ Health facility</span>
          <span style="color:#e67e22">◯ Outbreak cluster</span>
        </div>
      </div>
